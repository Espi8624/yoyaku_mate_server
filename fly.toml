# fly.toml app configuration file generated for saboten-server on 2025-10-23T22:38:17+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'saboten-server'
primary_region = 'nrt'

[build]
  [build.args]
    GO_VERSION = '1.23.0'

[env]
  PORT = '8080'
  GO_ENV = "production"

[dns]
  nameservers = ["8.8.8.8", "8.8.4.4"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
